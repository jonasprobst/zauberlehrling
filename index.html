<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dungeon der Runen</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:100%;height:-webkit-fill-available;}
body{
  min-height:100vh;min-height:100dvh;min-height:-webkit-fill-available;
  background:#1a0e06;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;user-select:none;font-family:'Cinzel',serif;color:#ddd4bb;
}

/* ══ SCREENS ══ */
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;z-index:10;}
.screen.active{opacity:1;pointer-events:all;}

/* ══ TITLE ══ */
#s-title{background:radial-gradient(ellipse at 50% 35%,#3a2010 0%,#1a0e06 65%);}
.t-runes{font-size:2rem;letter-spacing:.5em;color:rgba(245,192,48,.2);margin-bottom:20px;animation:rdrift 6s ease-in-out infinite alternate;}
@keyframes rdrift{from{letter-spacing:.3em;opacity:.15}to{letter-spacing:.7em;opacity:.3}}
.t-main{font-family:'Cinzel Decorative',cursive;font-size:clamp(2rem,8vw,3.2rem);font-weight:900;color:#f5c030;text-shadow:0 0 30px rgba(245,192,48,.6),0 0 80px rgba(245,176,0,.15);text-align:center;line-height:1.25;margin-bottom:10px;}
.t-sub{font-size:.7rem;letter-spacing:.35em;color:rgba(221,212,187,.35);text-align:center;margin-bottom:48px;text-transform:uppercase;}
.t-btn{padding:20px 56px;font-family:'Cinzel Decorative',cursive;font-size:1.1rem;font-weight:700;letter-spacing:.08em;background:linear-gradient(135deg,#7a3800,#cc6600);color:#fff;border:none;border-radius:16px;cursor:pointer;box-shadow:0 0 32px rgba(200,100,0,.5),0 6px 24px rgba(0,0,0,.5);animation:tbpulse 2.2s ease-in-out infinite;}
@keyframes tbpulse{0%,100%{box-shadow:0 0 20px rgba(200,100,0,.4),0 6px 24px rgba(0,0,0,.5)}50%{box-shadow:0 0 50px rgba(220,120,0,.8),0 0 100px rgba(200,80,0,.2),0 6px 24px rgba(0,0,0,.5)}}
.t-btn:active{transform:scale(.96);}

/* ══ WIN ══ */
#s-win{background:radial-gradient(ellipse at 50% 40%,#2a1808 0%,#100804 70%);}
.w-trophy{font-size:clamp(6rem,22vw,10rem);animation:wpop .8s cubic-bezier(.34,1.56,.64,1) both;filter:drop-shadow(0 0 50px gold);}
@keyframes wpop{from{transform:scale(0) rotate(-25deg);opacity:0}75%{transform:scale(1.18) rotate(8deg)}to{transform:scale(1) rotate(0);opacity:1}}
.w-title{font-family:'Cinzel Decorative',cursive;font-size:clamp(1.6rem,6vw,2.8rem);font-weight:900;color:#f5c030;text-shadow:0 0 24px rgba(245,192,48,.8);margin:14px 0 4px;animation:fup .5s .35s both;}
.w-sub{font-size:.75rem;letter-spacing:.25em;color:#f5c030;margin-bottom:28px;animation:fup .5s .5s both;text-transform:uppercase;}
.w-runes{display:flex;gap:12px;margin-bottom:32px;animation:fup .5s .4s both;}
.w-rune{width:54px;height:54px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;animation:runeReveal .5s calc(.6s + var(--i)*.12s) both;}
@keyframes runeReveal{from{transform:scale(0) rotate(-15deg);opacity:0}75%{transform:scale(1.2)}to{transform:scale(1);opacity:1}}
.w-rune .wr-e{font-size:1.5rem;line-height:1;}
.w-rune .wr-s{font-family:'Cinzel Decorative',cursive;font-size:.6rem;font-weight:700;}
.w-btn{padding:16px 44px;font-family:'Cinzel Decorative',cursive;font-size:.95rem;background:linear-gradient(135deg,#7a3800,#cc6600);color:#fff;border:none;border-radius:14px;cursor:pointer;box-shadow:0 0 24px rgba(200,100,0,.5);animation:fup .5s .85s both;}
.w-btn:active{transform:scale(.96);}
@keyframes fup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* ══ GAME ══ */
#s-game{background:#1a0e06;justify-content:flex-start;padding:0;}
#game-wrap{width:100%;max-width:480px;height:100%;display:flex;flex-direction:column;}

/* ── HUD ── */
#hud{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 4px;flex-shrink:0;position:relative;z-index:20;}

#mic-btn{background:rgba(232,216,184,.06);border:1px solid rgba(232,216,184,.12);border-radius:20px;padding:5px 14px;font-size:1rem;cursor:pointer;color:rgba(232,216,184,.45);display:flex;align-items:center;gap:5px;}
#exit-btn{background:rgba(232,216,184,.06);border:1px solid rgba(232,216,184,.12);border-radius:20px;padding:5px 12px;font-size:.85rem;cursor:pointer;color:rgba(232,216,184,.35);display:flex;align-items:center;gap:4px;letter-spacing:.04em;}
#exit-btn:active{background:rgba(255,255,255,.1);}
#mic-btn:active{background:rgba(255,255,255,.12);}

/* ── RUNE BAR ── */
#rune-bar{display:flex;align-items:center;justify-content:center;gap:7px;padding:3px 14px 6px;flex-shrink:0;z-index:20;}
.rs{width:clamp(42px,11vw,54px);height:clamp(42px,11vw,54px);border-radius:9px;border:2px solid rgba(200,160,80,.18);background:rgba(200,160,80,.06);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:all .4s;}
.rs.earned{border-color:var(--c,#f5a623);box-shadow:0 0 16px color-mix(in srgb,var(--c,#f5a623) 45%,transparent);background:color-mix(in srgb,var(--c,#f5a623) 10%,transparent);}
/* rs-e removed from rune bar, kept for win screen only */
.rs .rs-s{font-family:'Cinzel Decorative',cursive;font-size:clamp(.65rem,.9em,.85rem);font-weight:700;color:rgba(232,216,184,.18);transition:all .4s;line-height:1;}
.rs.earned .rs-s{color:var(--c,#f5a623);}
.rs.boss-now{animation:bnow 1.2s ease-in-out infinite;border-color:var(--bnow-col,#f5c030) !important;}
@keyframes bnow{0%,100%{box-shadow:0 0 10px color-mix(in srgb,var(--bnow-col,#f5c030) 50%,transparent)}50%{box-shadow:0 0 30px color-mix(in srgb,var(--bnow-col,#f5c030) 90%,transparent),0 0 55px color-mix(in srgb,var(--bnow-col,#f5c030) 25%,transparent)}}
.rs.boss-done{border-color:var(--c,#f5a623) !important;box-shadow:0 0 18px color-mix(in srgb,var(--c,#f5a623) 60%,transparent) !important;opacity:.7;}

/* ── DUNGEON VIEWPORT ── */
#dungeon{flex:1;min-height:0;width:100%;position:relative;overflow:hidden;cursor:pointer;background:#1a0e06;}
#cast-glow{width:100%;height:0;position:relative;pointer-events:none;z-index:25;margin-top:0;flex-shrink:0;transition:box-shadow .2s, opacity .2s;opacity:0;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 50px 25px rgba(255,180,40,.4),0 0 100px 50px rgba(255,100,0,.2);}50%{box-shadow:0 0 80px 40px rgba(255,200,60,.65),0 0 160px 80px rgba(255,120,0,.35);}}
#cast-glow.active{opacity:1;box-shadow:0 0 60px 30px rgba(255,180,40,.5),0 0 120px 60px rgba(255,100,0,.25);animation:glowPulse .6s ease-in-out infinite;}


/* creature */
#creature-layer{position:absolute;inset:0;pointer-events:none;}
#cre{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:clamp(120px,32vw,200px);height:auto;line-height:1;opacity:0;transition:opacity .3s;}
.cre-float{animation:cfloat 2.6s ease-in-out infinite;}
@keyframes cfloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.cre-taunt{animation:ctaunt .7s ease-in-out!important;}
@keyframes ctaunt{
  0%  {transform:translate(-50%,-50%) scale(1)}
  25% {transform:translate(-50%,-58%) scale(1.35) rotate(-4deg)}
  50% {transform:translate(-50%,-54%) scale(1.4)  rotate(4deg)}
  75% {transform:translate(-50%,-56%) scale(1.32) rotate(-2deg)}
  100%{transform:translate(-50%,-50%) scale(1)}
}
.cre-die{animation:cdie .8s ease-out forwards!important;}
@keyframes cdie{0%{transform:translate(-50%,-50%) scale(1);opacity:1}25%{transform:translate(-50%,-50%) scale(1.35) rotate(12deg);filter:brightness(3) drop-shadow(0 0 24px orange)}60%{transform:translate(-50%,-50%) scale(.5) rotate(-22deg);opacity:.4}100%{transform:translate(-50%,-50%) scale(0) rotate(35deg);opacity:0}}

.cre-hit{animation:chit .45s ease-out!important;}
@keyframes chit{
  0%  {transform:translate(-50%,-50%) scale(1)}
  15% {transform:translate(-50%,-62%) scale(1.18) rotate(-5deg); filter:brightness(2.5) drop-shadow(0 0 20px #fff)}
  35% {transform:translate(-48%,-48%) scale(.92) rotate(3deg);   filter:brightness(1.8) drop-shadow(0 0 12px #ffaa00)}
  55% {transform:translate(-52%,-54%) scale(1.06) rotate(-2deg); filter:brightness(1.4)}
  100%{transform:translate(-50%,-50%) scale(1);                  filter:none}
}

/* ── BOSS ENTRY ── */
/* Boss intro overlay - full screen dramatic */
#boss-intro{
  position:fixed;inset:0;z-index:40;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 50%,#3a0a00 0%,#1a0600 60%,#080200 100%);
  opacity:0;pointer-events:none;
  transition:opacity .3s;
  gap:0;
}
#boss-intro.show{opacity:1;pointer-events:all;}

/* Pulsing ring behind boss */
#boss-ring{
  position:absolute;width:min(70vw,340px);height:min(70vw,340px);
  border-radius:50%;
  background:conic-gradient(
    #ff0000 0deg, #ff6600 40deg, #ffcc00 80deg,
    #ff0066 130deg, #aa00ff 180deg, #ff0000 220deg,
    #ff4400 270deg, #ffaa00 310deg, #ff0000 360deg
  );
  opacity:0;
  animation:none;
  filter:blur(18px);
}
#boss-ring.active{opacity:.45;animation:bossRingSpin 3s linear infinite;}
@keyframes bossRingSpin{to{transform:rotate(360deg);}}

/* The boss SVG container during intro */
#boss-preview{
  position:relative;z-index:2;
  width:min(55vw,260px);height:min(66vw,312px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;
}
#boss-preview.show{animation:bossEntryPop .7s cubic-bezier(.34,1.56,.64,1) .4s forwards;}
@keyframes bossEntryPop{
  0%  {opacity:0;transform:scale(0.05) rotate(-15deg);filter:blur(20px) brightness(5);}
  40% {opacity:1;transform:scale(1.3) rotate(5deg);filter:blur(0) brightness(2.5);}
  70% {transform:scale(.95) rotate(-2deg);filter:brightness(1.4);}
  100%{transform:scale(1) rotate(0);opacity:1;filter:brightness(1);}
}
#boss-preview svg{width:100%;height:100%;}

/* Boss name text */
#boss-name-text{
  position:relative;z-index:3;
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(1.2rem,5vw,2rem);
  font-weight:900;
  color:#ff3300;
  text-shadow:0 0 20px #ff3300,0 0 50px rgba(255,51,0,.5);
  letter-spacing:.1em;
  opacity:0;
  margin-top:16px;
  text-align:center;
}
#boss-name-text.show{animation:bossNameReveal .5s .9s both;}
@keyframes bossNameReveal{
  from{opacity:0;transform:scaleX(0.2);letter-spacing:.5em;}
  to  {opacity:1;transform:scaleX(1);letter-spacing:.1em;}
}

/* Tap to continue */
#boss-tap{
  position:relative;z-index:3;
  font-size:.7rem;letter-spacing:.3em;
  color:rgba(255,180,100,.6);
  text-transform:uppercase;
  margin-top:20px;opacity:0;
  animation:none;
}
#boss-tap.show{animation:fup .4s 1.4s both,tapBlink 1.2s 1.8s ease-in-out infinite;}
@keyframes tapBlink{0%,100%{opacity:.4}50%{opacity:.9}}

/* Screen shake keyframes */
@keyframes bossQuake{
  0%,100%{transform:translate(0,0) rotate(0)}
  10%{transform:translate(-8px,-4px) rotate(-.4deg)}
  20%{transform:translate(8px,4px) rotate(.4deg)}
  30%{transform:translate(-6px,3px) rotate(-.3deg)}
  40%{transform:translate(6px,-3px) rotate(.3deg)}
  50%{transform:translate(-10px,2px) rotate(-.5deg)}
  60%{transform:translate(10px,-2px) rotate(.5deg)}
  70%{transform:translate(-4px,4px) rotate(-.2deg)}
  80%{transform:translate(4px,-4px) rotate(.2deg)}
  90%{transform:translate(-2px,2px)}
}
.boss-quake{animation:bossQuake .6s ease-out;}

/* Boss glow pulse during fight */
.cre-boss-pulse{
  animation:cfloat 2s ease-in-out infinite, bossPulse 2.5s ease-in-out infinite;
}
@keyframes bossPulse{
  0%,100%{filter:drop-shadow(0 0 12px #ff3300) drop-shadow(0 0 30px rgba(255,51,0,.3));}
  50%    {filter:drop-shadow(0 0 28px #ff6600) drop-shadow(0 0 60px rgba(255,102,0,.6)) brightness(1.1);}
}

/* Lightning flashes for boss entry */
#boss-lightning{
  position:fixed;inset:0;z-index:39;pointer-events:none;
  opacity:0;background:white;
}
#boss-lightning.flash{animation:bossFlash .15s ease-out;}
@keyframes bossFlash{0%{opacity:.7}100%{opacity:0}}

/* ── NAV ARROWS — unified SVG arrows floating on dungeon ── */
#nav-arrows{
  position:absolute;
  bottom:8%;left:0;right:0;
  display:flex;justify-content:center;
  align-items:flex-end;
  gap:clamp(16px,8vw,48px);
  pointer-events:none;
  opacity:0;
  transition:opacity .35s;
  z-index:6;
}
#nav-arrows.show{opacity:1;pointer-events:all;}

.nav-arrow{
  cursor:pointer;
  transition:transform .15s, opacity .15s;
  filter:drop-shadow(0 4px 16px rgba(0,0,0,.7));
  -webkit-tap-highlight-color:transparent;
}
.nav-arrow:active{transform:scale(.88) !important;}

/* Idle float animation */
.nav-arrow.fwd  { animation:arrowBobUp    1.6s ease-in-out infinite; }
.nav-arrow.left { animation:arrowBobLeft  1.7s ease-in-out infinite; }
.nav-arrow.right{ animation:arrowBobRight 1.7s ease-in-out infinite; animation-delay:.2s; }

@keyframes arrowBobUp    {0%,100%{transform:translateY(0)}   50%{transform:translateY(-9px)}}
@keyframes arrowBobLeft  {0%,100%{transform:translateX(0)}   50%{transform:translateX(-9px)}}
@keyframes arrowBobRight {0%,100%{transform:translateX(0)}   50%{transform:translateX(9px)}}

/* ── SPELL PANEL ── */
#spell-panel{width:100%;flex-shrink:0;background:linear-gradient(180deg,transparent 0%,rgba(18,10,4,.96) 18%,rgba(10,6,4,1) 100%);padding:6px 12px 14px;display:flex;flex-direction:column;align-items:center;gap:8px;z-index:20;opacity:0;pointer-events:none;transition:opacity .3s;}
#spell-panel.show{opacity:1;pointer-events:all;}

#syl-row{display:flex;align-items:center;gap:4px;justify-content:center;min-height:56px;}
.sy{width:clamp(42px,12vw,56px);height:clamp(42px,12vw,56px);border-radius:9px;border:2px solid rgba(255,255,255,.06);background:rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;transition:all .3s;}
.sy.locked .sy-l{opacity:.18;color:#6a6080;}
.sy.active{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);animation:syaglow 1.3s ease-in-out infinite;}
@keyframes syaglow{0%,100%{box-shadow:0 0 8px rgba(255,255,255,.2)}50%{box-shadow:0 0 20px rgba(255,255,255,.5),0 0 40px rgba(255,255,255,.1)}}
.sy.active .sy-l{color:rgba(255,255,255,.9);}
.sy.solved{border-color:var(--rc,#f5a623);background:color-mix(in srgb,var(--rc,#f5a623) 12%,transparent);box-shadow:0 0 14px color-mix(in srgb,var(--rc,#f5a623) 55%,transparent);}
.sy.sy-solving{border-color:white;background:rgba(255,255,255,.4);box-shadow:0 0 32px rgba(255,255,255,.95),0 0 60px rgba(255,255,255,.4);transform:scale(1.18);transition:none;}
.sy.wrong-flash{animation:wrongflash .45s ease-out forwards;}
@keyframes wrongflash{0%{border-color:#ff3a55;background:rgba(255,58,85,.35);transform:scale(1.08)}50%{border-color:#ff3a55;background:rgba(255,58,85,.15)}100%{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.06);transform:scale(1)}}
.sy-l{font-family:'Cinzel Decorative',cursive;font-size:clamp(.9rem,3vw,1.25rem);font-weight:700;color:#ddd4bb;transition:color .3s;}
.sy.solved .sy-l{color:var(--rc,#f5a623);}
.sy-dot{font-size:.8rem;color:rgba(255,255,255,.1);transition:color .3s;}
.sy-dot.lit{color:rgba(255,255,255,.5);text-shadow:none;}



#cast-btn{width:100%;min-height:62px;border:none;border-radius:14px;cursor:pointer;background:linear-gradient(135deg,#7a3800,#cc6200,#ff8c00);box-shadow:0 0 22px rgba(200,100,0,.5),0 5px 22px rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;gap:10px;font-size:1.9rem;position:relative;overflow:hidden;transition:all .2s;}
#cast-btn:active{transform:scale(.97);}
#cast-btn.recording{transform:scale(.98);box-shadow:0 0 40px rgba(255,160,0,.9),0 0 80px rgba(255,100,0,.4),0 5px 22px rgba(0,0,0,.5);background:linear-gradient(135deg,#7a3800,#cc6200,#ff8c00);}
#spell-particles{position:absolute;inset:0;pointer-events:none;overflow:visible;border-radius:14px;}
.sp{position:absolute;border-radius:50%;pointer-events:none;animation:spOrbit linear infinite;}
@keyframes spOrbit{
  0%  {transform:rotate(var(--a)) translateX(var(--r)) scale(1);   opacity:.9;}
  50% {transform:rotate(calc(var(--a) + 180deg)) translateX(var(--r)) scale(.6); opacity:.5;}
  100%{transform:rotate(calc(var(--a) + 360deg)) translateX(var(--r)) scale(1);  opacity:.9;}
}
@keyframes wandPulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.3) rotate(15deg);}
}
#cast-btn.recording #btn-icon{animation:wandPulse .4s ease-in-out infinite;}
#cast-btn:disabled{opacity:.28;pointer-events:none;}
#cast-btn::before{content:'';position:absolute;top:-60%;left:-70%;width:45%;height:220%;background:rgba(255,255,255,.07);transform:skewX(-20deg);animation:cshine 5s ease-in-out infinite;}
@keyframes cshine{0%,65%,100%{left:-70%}35%{left:130%}}
#mbars{display:flex;gap:3px;align-items:center;height:26px;opacity:0;transition:opacity .3s;}
#mbars.on{opacity:1;}
.mb{width:5px;background:#fff;border-radius:3px;animation:mbp var(--d) ease-in-out infinite alternate;box-shadow:0 0 4px rgba(255,255,255,.8);}
@keyframes mbp{from{height:3px}to{height:24px}}

/* ── OVERLAYS ── */
#flash-overlay{position:fixed;inset:0;z-index:50;pointer-events:none;opacity:0;transition:opacity .1s;}
#flash-overlay.red{background:rgba(255,40,55,.3);opacity:1;}
#flash-overlay.teal{background:rgba(245,192,48,.18);opacity:1;}



/* screen shake */
@keyframes screenShake{
  0%,100%{transform:translateX(0)}
  10%{transform:translateX(-10px) rotate(-.5deg)}
  20%{transform:translateX(10px) rotate(.5deg)}
  30%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  50%{transform:translateX(-5px)}
  60%{transform:translateX(5px)}
  70%{transform:translateX(-3px)}
  80%{transform:translateX(3px)}
}
.screen-shake{animation:screenShake .5s ease-out;}

/* sparks */
.spark{position:fixed;border-radius:50%;pointer-events:none;z-index:55;animation:spkfly ease-out forwards;}
@keyframes spkfly{to{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
.confetti{position:fixed;pointer-events:none;z-index:65;animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── SETTINGS ── */
#settings-btn{position:absolute;top:16px;right:16px;width:42px;height:42px;
  border-radius:50%;background:rgba(200,160,80,.12);border:1.5px solid rgba(200,160,80,.25);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:rgba(200,160,80,.6);font-size:1.2rem;transition:all .2s;}
#settings-btn:hover{background:rgba(200,160,80,.22);color:rgba(200,160,80,.9);}

#settings-overlay{position:fixed;inset:0;z-index:50;
  background:rgba(10,6,2,.82);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .25s;}
#settings-overlay.open{opacity:1;pointer-events:all;}

#settings-panel{background:#1e1208;border:1.5px solid rgba(200,160,80,.2);
  border-radius:20px;padding:24px 20px 20px;width:min(340px,90vw);
  max-height:80vh;overflow-y:auto;display:flex;flex-direction:column;gap:16px;}

.set-title{font-family:'Cinzel Decorative',cursive;font-size:.9rem;
  color:#f5c030;text-align:center;letter-spacing:.1em;}
.set-close{position:absolute;top:14px;right:14px;background:none;border:none;
  color:rgba(200,160,80,.5);font-size:1.4rem;cursor:pointer;padding:4px 8px;
  border-radius:8px;}
.set-close:hover{color:#f5c030;}
.set-section{display:flex;flex-direction:column;gap:8px;}
.set-label{font-size:.62rem;letter-spacing:.18em;color:rgba(200,160,80,.5);
  text-transform:uppercase;}
.set-chips{display:flex;flex-wrap:wrap;gap:6px;}
.set-chip{padding:5px 12px;border-radius:20px;font-family:'Cinzel',serif;font-size:.75rem;
  font-weight:700;letter-spacing:.05em;cursor:pointer;border:1.5px solid rgba(200,160,80,.25);
  background:rgba(200,160,80,.06);color:rgba(232,216,184,.45);transition:all .18s;}
.set-chip.on{border-color:rgba(200,160,80,.7);background:rgba(200,160,80,.18);
  color:rgba(232,216,184,.9);}
.set-divider{height:1px;background:rgba(200,160,80,.1);}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.set-row-label{font-size:.75rem;color:rgba(232,216,184,.6);letter-spacing:.04em;}
.set-toggle{position:relative;width:48px;height:26px;flex-shrink:0;}
.set-toggle input{opacity:0;width:0;height:0;}
.set-toggle-track{position:absolute;inset:0;border-radius:13px;
  background:rgba(200,160,80,.15);border:1.5px solid rgba(200,160,80,.2);
  cursor:pointer;transition:all .2s;}
.set-toggle input:checked+.set-toggle-track{background:rgba(245,192,48,.35);
  border-color:rgba(245,192,48,.6);}
.set-toggle-track::after{content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;background:rgba(200,160,80,.4);
  transition:transform .2s;}
.set-toggle input:checked+.set-toggle-track::after{transform:translateX(22px);
  background:#f5c030;}
.set-info{font-size:.58rem;color:rgba(200,160,80,.3);text-align:center;
  line-height:1.5;letter-spacing:.04em;}
</style>
</head>
<body>
<div id="flash-overlay"></div>
<div id="boss-lightning"></div>

<!-- BOSS INTRO OVERLAY -->
<div id="boss-intro" onclick="dismissBossIntro()">
  <div id="boss-ring"></div>
  <div id="boss-preview"></div>
  <div id="boss-name-text"></div>
  <div id="boss-tap">✦ Tippe zum Kämpfen ✦</div>
</div>

<!-- TITLE -->
<!-- SETTINGS OVERLAY -->
<div id="settings-overlay" onclick="settingsClickOutside(event)">
  <div id="settings-panel">
    <div class="set-title">⚙ Einstellungen</div>
    <button class="set-close" onclick="closeSettings()">✕</button>

    <div class="set-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
        <div class="set-label" style="margin-bottom:0">Vokale</div>
        <button id="vowel-toggle-btn" onclick="toggleAllVowels()"
          style="font-size:.58rem;padding:3px 10px;border-radius:10px;border:1px solid rgba(200,160,80,.3);background:rgba(200,160,80,.08);color:rgba(200,160,80,.6);cursor:pointer;letter-spacing:.06em;"></button>
      </div>
      <div class="set-chips" id="set-vowels"></div>
    </div>

    <div class="set-divider"></div>

    <div class="set-section">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;">
        <div class="set-label" style="margin-bottom:0">Konsonanten</div>
        <button id="cons-toggle-btn" onclick="toggleAllConsonants()"
          style="font-size:.58rem;padding:3px 10px;border-radius:10px;border:1px solid rgba(200,160,80,.3);background:rgba(200,160,80,.08);color:rgba(200,160,80,.6);cursor:pointer;letter-spacing:.06em;"></button>
      </div>
      <div class="set-chips" id="set-consonants"></div>
    </div>

    <div class="set-divider"></div>

    <div class="set-row">
      <div style="display:flex;flex-direction:column;gap:3px;">
        <div class="set-row-label">🎙 Spracherkennung</div>
        <div id="mic-status-label" style="font-size:.58rem;letter-spacing:.04em;"></div>
      </div>
      <label class="set-toggle">
        <input type="checkbox" id="set-mic-toggle" onchange="settingsMicToggle(this.checked)"/>
        <div class="set-toggle-track"></div>
      </label>
    </div>

    <div class="set-info">
      Silben werden aus Konsonant + Vokal gebildet.<br>
      Mindestens 2 Konsonanten und 2 Vokale auswählen.
    </div>
  </div>
</div>

<div class="screen active" id="s-title">
  <button id="settings-btn" onclick="openSettings()">⚙</button>
  <div class="t-runes">ᚠ ᚢ ᚦ ᚱ ᚲ</div>
  <div class="t-main">Dungeon<br>der Runen</div>
  <div class="t-sub">Ein Abenteuer für mutige Zauberer</div>
  <button class="t-btn" onclick="startGame()">⚔ Eintreten ⚔</button>
</div>

<!-- WIN -->
<div class="screen" id="s-win">
  <div class="w-trophy">🏆</div>
  <div class="w-title">Meister der Runen!</div>
  <div class="w-sub">Du hast den Dungeon bezwungen</div>
  <div class="w-runes" id="w-runes"></div>
  <button class="w-btn" onclick="startGame()">▶ Nochmal!</button>
</div>

<!-- GAME -->
<div class="screen" id="s-game">
<div id="game-wrap">
  <div id="hud">
    <div id="mic-btn"><span id="mic-icon">🎙</span></div>
    <div id="exit-btn" onclick="exitDungeon()">✕</div>
  </div>
  <div id="rune-bar"></div>

  <div id="dungeon" onclick="handleDungeonClick()">
    <!-- SVG + creature-layer + nav-arrows injected by draw() -->
  </div>

  <div id="cast-glow"></div>
  <div id="spell-panel">
    <div id="syl-row"></div>
    <button id="cast-btn" onpointerdown="castPressStart()" onpointerup="castPressEnd()" onpointercancel="castPressEnd()">
      <div id="spell-particles"></div>
      <span id="btn-icon">🪄</span>
      <div id="mbars">
        <div class="mb" style="--d:.35s"></div>
        <div class="mb" style="--d:.5s;animation-delay:.1s"></div>
        <div class="mb" style="--d:.4s;animation-delay:.2s"></div>
        <div class="mb" style="--d:.55s;animation-delay:.08s"></div>
        <div class="mb" style="--d:.38s;animation-delay:.15s"></div>
      </div>
    </button>
  </div>
</div>
</div>

// Syllable pool - random 5 picked each game
// SYL_POOL is built dynamically from settings — see buildSylPool()
// ── SETTINGS ──
const ALL_CONSONANTS = ['B','C','D','F','G','H','J','K','L','M','N','P','Q','R','S','T','V','W','X','Y','Z'];
const ALL_VOWELS     = ['A','E','I','O','U'];

// Load persisted settings or use defaults
function loadSettings(){
  try{
    var s=JSON.parse(localStorage.getItem('ddr-settings')||'{}');
    return {
      consonants: s.consonants || ALL_CONSONANTS.slice(),
      vowels:     s.vowels     || ALL_VOWELS.slice(),
      mic:        s.mic        !== undefined ? s.mic : false,
    };
  }catch(e){ return {consonants:ALL_CONSONANTS.slice(),vowels:ALL_VOWELS.slice(),mic:false}; }
}
function saveSettings(){
  try{ localStorage.setItem('ddr-settings', JSON.stringify(activeSettings)); }catch(e){}
}

var activeSettings = loadSettings();

// Build SYL_POOL dynamically from active settings
function buildSylPool(){
  var pool=[];
  activeSettings.consonants.forEach(function(con){
    activeSettings.vowels.forEach(function(vow){ pool.push(con+vow); });
  });
  return pool;
}

function openSettings(){
  renderSettingsChips();
  updateMicUI();
  document.getElementById('settings-overlay').classList.add('open');
}
function closeSettings(){
  document.getElementById('settings-overlay').classList.remove('open');
  saveSettings();
}
function settingsClickOutside(e){
  if(e.target===document.getElementById('settings-overlay')) closeSettings();
}

function toggleAllConsonants(){
  if(activeSettings.consonants.length > 1){
    activeSettings.consonants = [ALL_CONSONANTS[0]]; // reset to 1
  } else {
    activeSettings.consonants = ALL_CONSONANTS.slice(); // select all
  }
  renderSettingsChips();
}

function toggleAllVowels(){
  if(activeSettings.vowels.length > 1){
    activeSettings.vowels = [ALL_VOWELS[0]];
  } else {
    activeSettings.vowels = ALL_VOWELS.slice();
  }
  renderSettingsChips();
}

function renderSettingsChips(){
  // Update toggle button labels
  var cb=document.getElementById('cons-toggle-btn');
  if(cb) cb.textContent = activeSettings.consonants.length>1 ? 'Auswahl aufheben' : 'Alle auswählen';
  var vb=document.getElementById('vowel-toggle-btn');
  if(vb) vb.textContent = activeSettings.vowels.length>1 ? 'Auswahl aufheben' : 'Alle auswählen';

  renderChipGroup('set-consonants', ALL_CONSONANTS, activeSettings.consonants, function(val, on){
    if(on){ if(!activeSettings.consonants.includes(val)) activeSettings.consonants.push(val); }
    else  { if(activeSettings.consonants.length<=1){return false;} // min 2
            activeSettings.consonants=activeSettings.consonants.filter(function(x){return x!==val;}); }
    return true;
  });
  renderChipGroup('set-vowels', ALL_VOWELS, activeSettings.vowels, function(val, on){
    if(on){ if(!activeSettings.vowels.includes(val)) activeSettings.vowels.push(val); }
    else  { if(activeSettings.vowels.length<=1){return false;} // min 2
            activeSettings.vowels=activeSettings.vowels.filter(function(x){return x!==val;}); }
    return true;
  });
}

function renderChipGroup(containerId, all, active, onToggle){
  var el=document.getElementById(containerId);
  el.innerHTML='';
  all.forEach(function(val){
    var chip=document.createElement('button');
    chip.className='set-chip'+(active.includes(val)?' on':'');
    chip.textContent=val;
    chip.onclick=function(){
      var isOn=!active.includes(val);
      var ok=onToggle(val, isOn);
      if(ok!==false) renderSettingsChips();
    };
    el.appendChild(chip);
  });
}

function settingsMicToggle(on){
  activeSettings.mic = on;
  if(on){
    initSpeech(); // sets MIC_STATE='ready' or 'unavailable'
  } else {
    MIC_STATE='off';
    updateMicUI();
  }
  saveSettings();
}

// Monster colors palette - each encounter gets a unique color
const RUNE_COLORS = ['#f5a623','#4ea8ff','#ffdd44','#c97aff','#ff6eb0'];
const BOSS_COLORS = ['#ff4400','#cc3300','#ff6600'];


let currentBoss = null;
// ENC gets populated fresh each startGame()
let ENC = [];

function generateENC() {
  // Pick 5 unique syllables at random
  const pool = buildSylPool();
  if(pool.length===0){ return; } // nothing to do
  const chosen = [];
  // Fill 5 slots — allow repeats if pool is smaller than 5
  const fullPool = buildSylPool();
  while(chosen.length < 5) {
    const idx = Math.floor(Math.random() * fullPool.length);
    chosen.push(fullPool[idx]);
  }
  // Pick 5 random unique monsters
  const mPool = [...MONSTERS];
  const pickedMonsters = [];
  for(let i=0;i<5;i++){
    const idx = Math.floor(Math.random() * mPool.length);
    pickedMonsters.push(mPool.splice(idx,1)[0]);
  }
  ENC = pickedMonsters.map((m, i) => ({
    svg: m.svg,
    name: m.name,
    syl: chosen[i],
    col: RUNE_COLORS[i],
  }));
  // Pick random boss
  currentBoss = BOSSES[Math.floor(Math.random() * BOSSES.length)];
  currentBoss = {...currentBoss, col: BOSS_COLORS[Math.floor(Math.random()*BOSS_COLORS.length)]};
}

// Room types: affects corridor drawing
const RT = {HALL:'hall', ARCH:'arch', CRYPT:'crypt', CHAMBER:'chamber', FORK:'fork', BOSS:'boss', ENC:'enc', ENTRANCE:'entrance', PREBOSS:'preboss'};

// Walk rooms per step (2 steps between encounters, 1 for first encounter)
// Variants: multiple options per step picked randomly for variety
const STEP_ROOMS = [
  [RT.HALL, RT.ARCH, RT.CRYPT, RT.CHAMBER],   // step 1 options
  [RT.HALL, RT.CRYPT, RT.FORK,  RT.CHAMBER],  // step 2 options (optional fork)
];

let gPhase = 'title';  // title | walk | encounter | boss | win
let currentRuneCol = '#f5c030';
let encIdx = 0;        // 0-4 encounter, 5 = boss
let step   = 0;        // steps taken since last encounter (0-2)
let spellLives   = 3;  // lives per spell attempt
let sylProgress  = 0;  // how many syls solved in current spell

// Speech state — single source of truth
// 'unavailable': browser has no SR or permission denied
// 'off':         user disabled in settings
// 'ready':       initialised and active
var MIC_STATE = 'off'; // default off
var listening = false, rec = null;
// Legacy aliases so existing code still works
// MIC_STATE is the single source of truth ('off'|'ready'|'unavailable')
let currentRoom  = RT.HALL;
let hasFork      = false; // current room has left/right choice
let animating    = false;

// ── Room renderer — Kinderbuch Stil ──
// Classic one-point perspective, VP at canvas centre W/2 H/2
// Room variants add small details for visual variety

function makeDungeonSVG(room, progress){
  if(progress===undefined) progress=1;
  var W=300, H=400;
  var op=Math.max(0,Math.min(1,progress));
  var isFork    = room==='fork';
  var isEnc     = room==='enc'||room==='boss';
  var isBoss    = room==='boss';
  var isEntrance= room==='entrance';
  var isPreBoss = room==='preboss';

  // VP dead centre
  var vpX=W/2, vpY=H/2;
  // Far wall rectangle
  var fW=W*0.32, fH=H*0.40;
  var fL=vpX-fW/2, fR=vpX+fW/2;
  var fT=vpY-fH/2, fB=vpY+fH/2;

  // Colours
  var bgC  =isBoss?'#5a1200':isPreBoss?'#3a1a00':'#b8843a';
  var ceilC=isBoss?'#2a0800':isPreBoss?'#2a1400':'#3d2409';
  var wLC  =isBoss?'#3a0600':isPreBoss?'#3a1800':'#5c3a14';
  var wRC  =isBoss?'#280400':isPreBoss?'#2a1200':'#4a2d0c';
  var farC =isBoss?'#4a0800':isPreBoss?'#3a1a00':'#6b4c1e';
  var flrC =isBoss?'#3a1000':isPreBoss?'#4a2a08':'#8b5e1c';
  var arcC =isBoss?'#aa2400':isEntrance?'#d4a84a':'#c4903a';
  var ol   ='#2a1505';

  // Torch positions on side walls
  var tLx=fL*0.45, tRx=fR+(W-fR)*0.55, tY=H*0.44;

  // Pick a detail variant based on a simple hash of room+encIdx
  // so it changes each time but is stable during one room visit
  var variant = Math.floor(Math.random()*4); // 0-3, chosen once per draw call outside

  var p=[];
  p.push('<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg"'
    +(op<1?' opacity="'+op.toFixed(2)+'"':'')
    +' style="display:block;width:100%;height:100%;">');
  p.push('<defs>');
  if(isEntrance||(!isEnc&&!isPreBoss)){
    p.push('<radialGradient id="ag" cx="50%" cy="50%" r="20%">'
      +'<stop offset="0%" stop-color="rgba(255,210,100,.45)"/>'
      +'<stop offset="100%" stop-color="rgba(0,0,0,0)"/>'
      +'</radialGradient>');
  }
  if(isEnc){
    p.push('<radialGradient id="ms" cx="50%" cy="50%" r="20%">'
      +'<stop offset="0%" stop-color="rgba(255,160,40,.3)"/>'
      +'<stop offset="100%" stop-color="rgba(0,0,0,0)"/>'
      +'</radialGradient>');
  }
  p.push('<radialGradient id="tlg" cx="'+(tLx/W*100).toFixed(0)+'%" cy="'+(tY/H*100).toFixed(0)+'%" r="25%">'
    +'<stop offset="0%" stop-color="rgba(255,165,40,.55)"/>'
    +'<stop offset="100%" stop-color="rgba(0,0,0,0)"/>'
    +'</radialGradient>');
  p.push('<radialGradient id="trg" cx="'+(tRx/W*100).toFixed(0)+'%" cy="'+(tY/H*100).toFixed(0)+'%" r="25%">'
    +'<stop offset="0%" stop-color="rgba(255,165,40,.55)"/>'
    +'<stop offset="100%" stop-color="rgba(0,0,0,0)"/>'
    +'</radialGradient>');
  p.push('<radialGradient id="vg" cx="50%" cy="50%" r="70%">'
    +'<stop offset="50%" stop-color="rgba(0,0,0,0)"/>'
    +'<stop offset="100%" stop-color="rgba(15,8,2,.6)"/>'
    +'</radialGradient>');
  p.push('</defs>');

  // Background
  p.push('<rect width="'+W+'" height="'+H+'" fill="'+bgC+'"/>');

  // CEILING — skip for entrance (it draws its own full layout)
  if(!isEntrance){
  p.push('<path fill="'+ceilC+'" stroke="'+ol+'" stroke-width="3"'
    +' d="M0,0 L'+W+',0 L'+fR+','+fT+' L'+fL+','+fT+' Z"/>');
  [W*0.25,W*0.5,W*0.75].forEach(function(tx){
    var ix=vpX+(tx-vpX)*(vpY/(vpY-fT+0.001));
    p.push('<line x1="'+tx.toFixed(0)+'" y1="0" x2="'+ix.toFixed(0)+'" y2="'+fT
      +'" stroke="'+ol+'" stroke-width="1.5" opacity=".22"/>');
  });

  // LEFT WALL
  p.push('<path fill="'+wLC+'" stroke="'+ol+'" stroke-width="3"'
    +' d="M0,0 L0,'+H+' L'+fL+','+fB+' L'+fL+','+fT+' Z"/>');
  [fT+fH*0.3,fT+fH*0.6,fT+fH*0.85].forEach(function(wy){
    var scale=vpX/(vpX-fL+0.001);
    var ly=vpY+(wy-vpY)*scale;
    p.push('<line x1="'+fL+'" y1="'+wy.toFixed(0)+'" x2="0" y2="'+ly.toFixed(0)+'"'

    +' d="M'+W+',0 L'+W+','+H+' L'+fR+','+fB+' L'+fR+','+fT+' Z"/>');
  [fT+fH*0.3,fT+fH*0.6,fT+fH*0.85].forEach(function(wy){
    var scale=(W-vpX)/(fR-vpX+0.001);
    var ly=vpY+(wy-vpY)*scale;
    p.push('<line x1="'+fR+'" y1="'+wy.toFixed(0)+'" x2="'+W+'" y2="'+ly.toFixed(0)+'"'
      +' stroke="'+ol+'" stroke-width="1.5" opacity=".28"/>');
  });

  } // end if(!isEntrance)

  // FAR WALL / OPENING
  if(isPreBoss){
    // Heavy iron door — same construction as far wall but with door drawn on it
    p.push('<rect x="'+fL+'" y="'+fT+'" width="'+fW+'" height="'+fH
      +'" fill="'+farC+'" stroke="'+ol+'" stroke-width="3"/>');
    // Stone seams
    [fT+fH*0.28,fT+fH*0.55,fT+fH*0.78].forEach(function(wy){
      p.push('<line x1="'+fL+'" y1="'+wy.toFixed(0)+'" x2="'+fR+'" y2="'+wy.toFixed(0)+'"'
        +' stroke="'+ol+'" stroke-width="1" opacity=".25"/>');
    });
    // IRON DOOR — dark slab filling the far wall opening
    var dL=fL+4, dR=fR-4, dT=fT+4, dB=fB-4;
    p.push('<rect x="'+dL+'" y="'+dT+'" width="'+(dR-dL)+'" height="'+(dB-dT)+'"'
      +' fill="#1a1008" stroke="'+ol+'" stroke-width="2.5"/>');
    // Door planks horizontal
    p.push('<line x1="'+dL+'" y1="'+(dT+(dB-dT)*0.35)+'" x2="'+dR+'" y2="'+(dT+(dB-dT)*0.35)+'" stroke="'+ol+'" stroke-width="2"/>');
    p.push('<line x1="'+dL+'" y1="'+(dT+(dB-dT)*0.65)+'" x2="'+dR+'" y2="'+(dT+(dB-dT)*0.65)+'" stroke="'+ol+'" stroke-width="2"/>');
    // Door centre split
    p.push('<line x1="'+vpX+'" y1="'+dT+'" x2="'+vpX+'" y2="'+dB+'" stroke="'+ol+'" stroke-width="2"/>');
    // Iron rivets
    [[dL+4,dT+4],[dR-4,dT+4],[dL+4,dB-4],[dR-4,dB-4]].forEach(function(rv){
      p.push('<circle cx="'+rv[0]+'" cy="'+rv[1]+'" r="3" fill="#3a2810" stroke="'+ol+'" stroke-width="1.5"/>');
    });
    // Big golden lock
    var lx=vpX-8, ly2=vpY-5;
    p.push('<rect x="'+lx+'" y="'+ly2+'" width="16" height="12" rx="3" fill="#c49000" stroke="'+ol+'" stroke-width="2"/>');
    p.push('<path d="M'+(lx+3)+','+ly2+' Q'+(lx+3)+','+(ly2-8)+' '+(lx+8)+','+(ly2-8)+' Q'+(lx+13)+','+(ly2-8)+' '+(lx+13)+','+ly2
      +'" fill="none" stroke="#c49000" stroke-width="4" stroke-linecap="round"/>');
    p.push('<path d="M'+(lx+3)+','+ly2+' Q'+(lx+3)+','+(ly2-8)+' '+(lx+8)+','+(ly2-8)+' Q'+(lx+13)+','+(ly2-8)+' '+(lx+13)+','+ly2
      +'" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>');
    p.push('<circle cx="'+vpX+'" cy="'+(ly2+6)+'" r="3" fill="'+ol+'"/><circle cx="'+vpX+'" cy="'+(ly2+6)+'" r="1.5" fill="#ffd700"/>');
    // Ominous red glow around door edges
    p.push('<radialGradient id="dg" cx="50%" cy="50%" r="50%">'
      +'<stop offset="0%" stop-color="rgba(200,40,0,.0)"/>'
      +'<stop offset="85%" stop-color="rgba(200,40,0,.0)"/>'
      +'<stop offset="100%" stop-color="rgba(200,40,0,.25)"/>'
      +'</radialGradient>');
    p.push('<rect x="'+fL+'" y="'+fT+'" width="'+fW+'" height="'+fH+'" fill="url(#dg)"/>');

  } else if(isEntrance){
    // ── ENTRANCE: full-bleed frontal stone wall ──
    // Same dungeon palette, draws to canvas edges

    // Clip everything to viewBox boundaries
    p.push('<defs><clipPath id="ecl"><rect width="'+W+'" height="'+H+'"/></clipPath></defs>');
    p.push('<g clip-path="url(#ecl)">');
    // Stone wall — warm brown, fills everything
    p.push('<rect width="'+W+'" height="'+H+'" fill="#5c3a14"/>');

    // Stone block grid — same seam style as dungeon walls
    // Rows of blocks, staggered, drawn edge-to-edge
    var bH=H/7; // block row height
    for(var ri=0;ri<8;ri++){
      var ry=ri*bH;
      var offset=(ri%2===0)?0:44; // stagger
      for(var ci=-1;ci<5;ci++){
        var rx=ci*88+offset;
        var rw=82, rwh=bH-3;
        var shade=ri%3===0?'#5c3a14':ri%3===1?'#4a2d0c':'#6b4c1e';
        p.push('<rect x="'+rx.toFixed(0)+'" y="'+ry.toFixed(0)+'" width="'+rw+'" height="'+rwh.toFixed(0)+'"'
          +' fill="'+shade+'" stroke="#2a1505" stroke-width="2.5"/>');
        // Subtle surface highlight on each stone
        p.push('<rect x="'+(rx+4).toFixed(0)+'" y="'+(ry+4).toFixed(0)+'" width="'+(rw-8)+'" height="'+(rwh*0.4).toFixed(0)+'"'
          +' rx="1" fill="rgba(255,255,255,.06)"/>');
      }
    }

    // ARCH opening — keystone arch, same proportions as dungeon arch
    // Arch sits in upper-centre, big enough to feel real
    var aCX=W/2;
    var aW=W*0.56;          // wider than dungeon far wall
    var aL=aCX-aW/2, aR=aCX+aW/2;
    var aDoorB=H*0.90;      // door bottom near floor
    var aRad=aW/2;
    var aCY=aDoorB-aRad*1.1; // arch centre — higher so arch is tall

    // Arch stone surround — thick, same brown as dungeon ceiling
    var archThick=20;
    p.push('<path d="M'+(aL-archThick)+','+aDoorB
      +' L'+(aL-archThick)+','+(aCY)
      +' A'+(aRad+archThick)+' '+(aRad+archThick)+' 0 0 1 '+(aR+archThick)+','+aCY
      +' L'+(aR+archThick)+','+aDoorB+' Z"'
      +' fill="#3d2409" stroke="#2a1505" stroke-width="3"/>');
    // Keystone lines on arch surround
    for(var ai=0;ai<=10;ai++){
      var ang=Math.PI+ai*(Math.PI/10);
      var kx1=aCX+(aRad+2)*Math.cos(ang), ky1=aCY+(aRad+2)*Math.sin(ang);
      var kx2=aCX+(aRad+archThick-2)*Math.cos(ang), ky2=aCY+(aRad+archThick-2)*Math.sin(ang);
      p.push('<line x1="'+kx1.toFixed(1)+'" y1="'+ky1.toFixed(1)+'" x2="'+kx2.toFixed(1)+'" y2="'+ky2.toFixed(1)+'"'
        +' stroke="#2a1505" stroke-width="1.5"/>');
    }

    // Arch opening — dark inside with warm glow
    p.push('<path d="M'+aL+','+aDoorB
      +' L'+aL+','+aCY
      +' A'+aRad+' '+aRad+' 0 0 1 '+aR+','+aCY
      +' L'+aR+','+aDoorB+' Z"'
      +' fill="#1a0e06"/>');
    // Warm light from inside
    p.push('<radialGradient id="igl" cx="50%" cy="75%" r="50%">'
      +'<stop offset="0%" stop-color="rgba(255,180,60,.5)"/>'
      +'<stop offset="100%" stop-color="rgba(0,0,0,0)"/>'
      +'</radialGradient>');
    p.push('<path d="M'+aL+','+aDoorB
      +' L'+aL+','+aCY
      +' A'+aRad+' '+aRad+' 0 0 1 '+aR+','+aCY
      +' L'+aR+','+aDoorB+' Z"'
      +' fill="url(#igl)"/>');

    // DOOR — two panels, slightly ajar, same wood style as preboss door
    var dMid=aCX, dT=aCY, dB=aDoorB;
    var skewL=14, skewR=18; // ajar angle

    // Left panel — hinged left, right edge pulled back
    p.push('<path d="M'+aL+','+dT+' L'+(dMid-2)+','+(dT+skewL)
      +' L'+(dMid-2)+','+dB+' L'+aL+','+dB+' Z"'
      +' fill="#3d2409" stroke="#2a1505" stroke-width="2.5"/>');
    // Planks
    for(var pi=0;pi<4;pi++){
      var px=aL+(dMid-aL)*pi/3;
      var pxb=px+skewL*(pi/3);
      p.push('<line x1="'+px.toFixed(0)+'" y1="'+dT+'" x2="'+pxb.toFixed(0)+'" y2="'+dB+'"'
        +' stroke="#2a1505" stroke-width="1.5" opacity=".45"/>');
    }
    // Iron bands
    [0.28,0.6].forEach(function(bt){
      var by=dT+(dB-dT)*bt;
      var bsk=skewL*bt;
      p.push('<path d="M'+aL+','+by.toFixed(0)+' L'+(dMid-2)+','+(by+bsk*0.25).toFixed(0)+'"'
        +' stroke="#2a1505" stroke-width="5" stroke-linecap="round"/>');
      p.push('<path d="M'+aL+','+by.toFixed(0)+' L'+(dMid-2)+','+(by+bsk*0.25).toFixed(0)+'"'
        +' stroke="#443322" stroke-width="3" stroke-linecap="round"/>');
    });
    // Rivets
    [[aL+10,dT+(dB-dT)*0.14],[aL+10,dT+(dB-dT)*0.5],[aL+10,dT+(dB-dT)*0.84],
     [dMid-14,dT+(dB-dT)*0.14],[dMid-14,dT+(dB-dT)*0.5],[dMid-14,dT+(dB-dT)*0.84]].forEach(function(rv){
      p.push('<circle cx="'+rv[0].toFixed(0)+'" cy="'+rv[1].toFixed(0)+'" r="4" fill="#3a2810" stroke="#2a1505" stroke-width="1.5"/>');
    });
    // Depth edge on left door (inner face visible)
    p.push('<rect x="'+(dMid-8)+'" y="'+dT+'" width="6" height="'+(dB-dT)+'" fill="#2a1505" opacity=".5"/>');

    // Right panel — hinged right, left edge pulled back more (more open)
    p.push('<path d="M'+(dMid+2)+','+(dT+skewR)+' L'+aR+','+dT
      +' L'+aR+','+dB+' L'+(dMid+2)+','+dB+' Z"'
      +' fill="#4a2d0c" stroke="#2a1505" stroke-width="2.5"/>');
    for(var pi2=0;pi2<4;pi2++){
      var px2=dMid+2+(aR-dMid-2)*pi2/3;
      var py2t=dT+skewR*(1-pi2/3);
      p.push('<line x1="'+px2.toFixed(0)+'" y1="'+py2t.toFixed(0)+'" x2="'+px2.toFixed(0)+'" y2="'+dB+'"'
        +' stroke="#2a1505" stroke-width="1.5" opacity=".45"/>');
    }
    [0.28,0.6].forEach(function(bt){
      var by=dT+(dB-dT)*bt;
      var bsk=skewR*(1-bt);
      p.push('<path d="M'+(dMid+2)+','+(by+bsk*0.6).toFixed(0)+' L'+aR+','+by.toFixed(0)+'"'
        +' stroke="#2a1505" stroke-width="5" stroke-linecap="round"/>');
      p.push('<path d="M'+(dMid+2)+','+(by+bsk*0.6).toFixed(0)+' L'+aR+','+by.toFixed(0)+'"'
        +' stroke="#443322" stroke-width="3" stroke-linecap="round"/>');
    });
    [[dMid+14,dT+(dB-dT)*0.14],[dMid+14,dT+(dB-dT)*0.5],[dMid+14,dT+(dB-dT)*0.84],
     [aR-10, dT+(dB-dT)*0.14],[aR-10, dT+(dB-dT)*0.5],[aR-10, dT+(dB-dT)*0.84]].forEach(function(rv){
      p.push('<circle cx="'+rv[0].toFixed(0)+'" cy="'+rv[1].toFixed(0)+'" r="4" fill="#3a2810" stroke="#2a1505" stroke-width="1.5"/>');
    });
    // Depth edge on right door
    p.push('<rect x="'+dMid+'" y="'+dT+'" width="6" height="'+(dB-dT)+'" fill="#2a1505" opacity=".4"/>');

    // Door handles — iron rings same style as preboss lock
    p.push('<circle cx="'+(dMid-10)+'" cy="'+(dT+(dB-dT)*0.52)+'" r="7" fill="none" stroke="#443322" stroke-width="3.5"/>');
    p.push('<circle cx="'+(dMid-10)+'" cy="'+(dT+(dB-dT)*0.52)+'" r="7" fill="none" stroke="#665544" stroke-width="1.5"/>');
    p.push('<circle cx="'+(dMid+10)+'" cy="'+(dT+(dB-dT)*0.52)+'" r="7" fill="none" stroke="#443322" stroke-width="3.5"/>');
    p.push('<circle cx="'+(dMid+10)+'" cy="'+(dT+(dB-dT)*0.52)+'" r="7" fill="none" stroke="#665544" stroke-width="1.5"/>');

    // TORCHES on wall — same style as dungeon, flanking the arch
    [[aL-38, H*0.32],[aR+18, H*0.32]].forEach(function(ln){
      var lx=ln[0], ly=ln[1];
      // Wall bracket
      p.push('<rect x="'+(lx-3)+'" y="'+(ly+8)+'" width="8" height="18" rx="3" fill="#5c3a14" stroke="#2a1505" stroke-width="2"/>');
      // Torch flame — same as dungeon torches
      p.push('<ellipse cx="'+lx.toFixed(0)+'" cy="'+ly.toFixed(0)+'" rx="8" ry="13" fill="#ff8c00" stroke="#2a1505" stroke-width="2"/>');
      p.push('<ellipse cx="'+lx.toFixed(0)+'" cy="'+(ly+2)+'" rx="4.5" ry="8" fill="#ffd700"/>');
      // Glow
      p.push('<radialGradient id="tgen'+lx.toFixed(0)+'" cx="50%" cy="50%" r="50%">'
        +'<stop offset="0%" stop-color="rgba(255,165,40,.5)"/>'
        +'<stop offset="100%" stop-color="rgba(0,0,0,0)"/>'
        +'</radialGradient>');
      p.push('<ellipse cx="'+lx.toFixed(0)+'" cy="'+ly.toFixed(0)+'" rx="40" ry="40" fill="url(#tgen'+lx.toFixed(0)+')"/>');
    });

    // Floor — same colour as dungeon floor, stone flags
    p.push('<rect x="0" y="'+aDoorB+'" width="'+W+'" height="'+(H-aDoorB)+'" fill="#8b5e1c"/>');
    // Floor seam lines same as dungeon
    p.push('<line x1="0" y1="'+(aDoorB+(H-aDoorB)*0.4)+'" x2="'+W+'" y2="'+(aDoorB+(H-aDoorB)*0.4)+'" stroke="#2a1505" stroke-width="1.5" opacity=".3"/>');
    p.push('<line x1="0" y1="'+aDoorB+'" x2="'+W+'" y2="'+aDoorB+'" stroke="#2a1505" stroke-width="2.5"/>');

    // Vignette
    p.push('<rect width="'+W+'" height="'+H+'" fill="url(#vg)"/>');
    p.push('</g>');
    p.push('</svg>');
    return p.join('');
  } else if(!isFork){
    if(!isEnc){
      // Arch corridor
      var ah2=fH*0.18;
      p.push('<path fill="'+arcC+'" stroke="'+ol+'" stroke-width="3"'
        +' d="M'+fL+','+fT
        +' Q'+fL+','+(fT-ah2)+' '+vpX+','+(fT-ah2*1.5)
        +' Q'+fR+','+(fT-ah2)+' '+fR+','+fT
        +' L'+fR+','+fB+' L'+fL+','+fB+' Z"/>');
      p.push('<path fill="rgba(255,220,120,.28)"'
        +' d="M'+(fL+6)+','+(fT+2)
        +' Q'+(fL+6)+','+(fT-ah2+5)+' '+vpX+','+(fT-ah2*1.5+5)
        +' Q'+(fR-6)+','+(fT-ah2+5)+' '+(fR-6)+','+(fT+2)
        +' L'+(fR-6)+','+fB+' L'+(fL+6)+','+fB+' Z"/>');
      p.push('<rect width="'+W+'" height="'+H+'" fill="url(#ag)"/>');
    } else {
      // Solid encounter wall
      p.push('<rect x="'+fL+'" y="'+fT+'" width="'+fW+'" height="'+fH
        +'" fill="'+farC+'" stroke="'+ol+'" stroke-width="3"/>');
      [fT+fH*0.28,fT+fH*0.55,fT+fH*0.78].forEach(function(wy){
        p.push('<line x1="'+fL+'" y1="'+wy.toFixed(0)+'" x2="'+fR+'" y2="'+wy.toFixed(0)+'"'
          +' stroke="'+ol+'" stroke-width="1.5" opacity=".28"/>');
      });
      p.push('<line x1="'+vpX+'" y1="'+fT+'" x2="'+vpX+'" y2="'+fB+'"'
        +' stroke="'+ol+'" stroke-width="1" opacity=".2"/>');
      p.push('<rect width="'+W+'" height="'+H+'" fill="url(#ms)"/>');
      if(isBoss){
        p.push('<path d="M'+vpX+','+(fT+8)+' L'+(vpX+7)+','+(vpY+10)+' L'+(vpX-5)+','+(fB-10)+'"'
          +' fill="none" stroke="#ff3300" stroke-width="3" opacity=".65"/>');
        p.push('<path d="M'+vpX+','+(fT+8)+' L'+(vpX+7)+','+(vpY+10)+' L'+(vpX-5)+','+(fB-10)+'"'
          +' fill="none" stroke="#ffbb00" stroke-width="1" opacity=".5"/>');
      }
    }
  } else {
    // FORK
    p.push('<rect x="'+fL+'" y="'+fT+'" width="'+fW+'" height="'+fH
      +'" fill="'+farC+'" stroke="'+ol+'" stroke-width="3"/>');
    [fT+fH*0.3,fT+fH*0.6,fT+fH*0.82].forEach(function(wy){
      p.push('<line x1="'+fL+'" y1="'+wy.toFixed(0)+'" x2="'+fR+'" y2="'+wy.toFixed(0)+'"'
        +' stroke="'+ol+'" stroke-width="1.5" opacity=".25"/>');
    });
    var oT=fT+fH*0.05, oB=fB, oR=fL*0.72, oAH=(oB-oT)*0.15;
    p.push('<path fill="'+arcC+'" stroke="'+ol+'" stroke-width="2.5"'
      +' d="M0,'+oT+' Q0,'+(oT-oAH)+' '+(oR/2)+','+(oT-oAH*1.4)
      +' Q'+oR+','+(oT-oAH)+' '+oR+','+oT
      +' L'+oR+','+oB+' L0,'+oB+' Z"/>');
    p.push('<path fill="rgba(255,220,120,.22)"'
      +' d="M0,'+(oT+3)+' Q0,'+(oT-oAH+4)+' '+(oR/2)+','+(oT-oAH*1.4+4)
      +' Q'+(oR*0.85)+','+(oT-oAH+4)+' '+(oR*0.85)+','+(oT+3)
      +' L'+(oR*0.85)+','+oB+' L0,'+oB+' Z"/>');
    var roL=fR+(W-fR)*0.28;
    p.push('<path fill="'+arcC+'" stroke="'+ol+'" stroke-width="2.5"'
      +' d="M'+roL+','+oT+' Q'+roL+','+(oT-oAH)+' '+((roL+W)/2)+','+(oT-oAH*1.4)
      +' Q'+W+','+(oT-oAH)+' '+W+','+oT
      +' L'+W+','+oB+' L'+roL+','+oB+' Z"/>');
    p.push('<path fill="rgba(255,220,120,.22)"'
      +' d="M'+(roL+(W-roL)*0.15)+','+(oT+3)
      +' Q'+(roL+(W-roL)*0.15)+','+(oT-oAH+4)+' '+((roL+W)/2)+','+(oT-oAH*1.4+4)
      +' Q'+W+','+(oT-oAH+4)+' '+W+','+(oT+3)
      +' L'+W+','+oB+' L'+(roL+(W-roL)*0.15)+','+oB+' Z"/>');
  }

  // FLOOR
  if(!isEntrance){
  p.push('<path fill="'+flrC+'" stroke="'+ol+'" stroke-width="2.5"'
    +' d="M0,'+H+' L'+W+','+H+' L'+fR+','+fB+' L'+fL+','+fB+' Z"/>');
  // Floor perspective lines — hidden
  // Floor horizontal lines
  [fB+(H-fB)*0.25,fB+(H-fB)*0.5,fB+(H-fB)*0.75].forEach(function(fy){
    var t2=(fy-H)/(fB-H);
    var lx=fL*t2, rx=W-(W-fR)*t2;
    p.push('<line x1="'+lx.toFixed(0)+'" y1="'+fy.toFixed(0)+'" x2="'+rx.toFixed(0)+'" y2="'+fy.toFixed(0)+'"'
      +' stroke="'+ol+'" stroke-width="1.5" opacity=".2"/>');
  });

  } // end floor if(!isEntrance)

  // ── ROOM DETAILS (variety) ──
  // Use a seeded variant so it's stable within one draw but changes between rooms
  // variant is passed in as part of room string via roomVariant global
  if(!isEnc && !isBoss && !isEntrance && !isPreBoss){
    addRoomDetail(p, room, W, H, fL, fR, fT, fB, vpX, vpY, ol, flrC, wLC, isFork);
  }

  // Dust/dirt speckles on floor — always present, slightly different each room
  addFloorDust(p, W, H, fB, fL, fR, vpX, vpY, ol);

  // TORCH GLOWS + VIGNETTE — skip for entrance (has its own)
  if(!isEntrance){
  p.push('<rect width="'+W+'" height="'+H+'" fill="url(#tlg)"/>');
  p.push('<rect width="'+W+'" height="'+H+'" fill="url(#trg)"/>');
  // TORCHES
  [[tLx,tY],[tRx,tY]].forEach(function(t){
    var tx=t[0], ty=t[1];
    p.push('<rect x="'+(tx-5)+'" y="'+(ty+8)+'" width="10" height="16" rx="4" fill="'+wLC+'" stroke="'+ol+'" stroke-width="2"/>');
    p.push('<ellipse cx="'+tx+'" cy="'+ty+'" rx="8" ry="13" fill="#ff8c00" stroke="'+ol+'" stroke-width="2"/>');
    p.push('<ellipse cx="'+tx+'" cy="'+(ty+2)+'" rx="4.5" ry="8" fill="#ffd700"/>');
  });

  // VIGNETTE
  p.push('<rect width="'+W+'" height="'+H+'" fill="url(#vg)"/>');
  } // end if(!isEntrance)
  p.push('</svg>');
  return p.join('');
}

// Room detail variants — small decorations for variety
// Uses roomDetailSeed to pick variant, so same seed = same detail per visit
var roomDetailSeed = 0;
function pickDetail(){ roomDetailSeed++; return roomDetailSeed % 4; }

function addRoomDetail(p, room, W, H, fL, fR, fT, fB, vpX, vpY, ol, flrC, wLC, isFork){
  var d = currentDetailVariant; // set before draw() call
  if(isFork){
    // Fork details: something on the far wall
    if(d===0){
      // Skull carving on far wall centre
      p.push('<circle cx="'+vpX+'" cy="'+(vpY-8)+'" r="8" fill="'+wLC+'" stroke="'+ol+'" stroke-width="1.5"/>');
      p.push('<circle cx="'+(vpX-3)+'" cy="'+(vpY-10)+'" r="2.5" fill="'+ol+'"/>');
      p.push('<circle cx="'+(vpX+3)+'" cy="'+(vpY-10)+'" r="2.5" fill="'+ol+'"/>');
      p.push('<path d="M'+(vpX-3)+','+(vpY-3)+' Q'+vpX+','+(vpY)+' '+(vpX+3)+','+(vpY-3)+'" fill="none" stroke="'+ol+'" stroke-width="1.5"/>');
    } else if(d===1){
      // Crossed swords on wall
      p.push('<line x1="'+(vpX-10)+'" y1="'+(fT+fH*0.2)+'" x2="'+(vpX+10)+'" y2="'+(fT+fH*0.8)+'" stroke="#c4a040" stroke-width="3" stroke-linecap="round"/>');
      p.push('<line x1="'+(vpX+10)+'" y1="'+(fT+fH*0.2)+'" x2="'+(vpX-10)+'" y2="'+(fT+fH*0.8)+'" stroke="#c4a040" stroke-width="3" stroke-linecap="round"/>');
    } else if(d===2){
      // Torch sconce on far wall
      p.push('<rect x="'+(vpX-3)+'" y="'+(vpY-5)+'" width="6" height="10" rx="2" fill="'+wLC+'" stroke="'+ol+'" stroke-width="1.5"/>');
      p.push('<ellipse cx="'+vpX+'" cy="'+(vpY-8)+'" rx="5" ry="8" fill="#ff8c00" stroke="'+ol+'" stroke-width="1.5"/>');
      p.push('<ellipse cx="'+vpX+'" cy="'+(vpY-7)+'" rx="2.5" ry="5" fill="#ffd700"/>');
    }
    // d===3: bare wall (no detail)
  } else {
    // Straight: details on left/right walls or floor
    if(d===0){
      // Carpet on floor — perspective trapezoid
      var cy1=fB, cy2=H*0.92;
      var t1=(cy1-H)/(fB-H), t2=(cy2-H)/(fB-H);
      var cx1L=fL*t1+W*0.1*(1-t1), cx1R=W-(W-fR)*t1-W*0.1*(1-t1);
      var cx2L=W*0.12, cx2R=W*0.88;
      p.push('<path d="M'+cx1L.toFixed(0)+','+cy1.toFixed(0)
        +' L'+cx1R.toFixed(0)+','+cy1.toFixed(0)
        +' L'+cx2R.toFixed(0)+','+cy2.toFixed(0)
        +' L'+cx2L.toFixed(0)+','+cy2.toFixed(0)+' Z"'
        +' fill="#8b2a14" stroke="'+ol+'" stroke-width="2" opacity=".75"/>');
      // Carpet border
      p.push('<path d="M'+(cx1L+4).toFixed(0)+','+cy1.toFixed(0)
        +' L'+(cx1R-4).toFixed(0)+','+cy1.toFixed(0)
        +' L'+(cx2R-6).toFixed(0)+','+cy2.toFixed(0)
        +' L'+(cx2L+6).toFixed(0)+','+cy2.toFixed(0)+' Z"'
        +' fill="none" stroke="#c4a040" stroke-width="1.5" opacity=".7"/>');
      // Diamond pattern centre
      p.push('<path d="M'+vpX+','+(cy1+8)+' L'+(vpX+16)+','+(cy1+(cy2-cy1)*0.5)
        +' L'+vpX+','+(cy2-8)+' L'+(vpX-16)+','+(cy1+(cy2-cy1)*0.5)+' Z"'
        +' fill="none" stroke="#c4a040" stroke-width="1.5" opacity=".6"/>');
    } else if(d===1){
      // Picture frame on left wall
      var pfy=H*0.38, pfx=fL*0.2, pfw=fL*0.45, pfh=fL*0.35;
      p.push('<rect x="'+pfx.toFixed(0)+'" y="'+pfy.toFixed(0)+'" width="'+pfw.toFixed(0)+'" height="'+pfh.toFixed(0)+'"'
        +' fill="#1a0e06" stroke="#c4a040" stroke-width="3"/>');
      p.push('<rect x="'+(pfx+4).toFixed(0)+'" y="'+(pfy+4).toFixed(0)+'" width="'+(pfw-8).toFixed(0)+'" height="'+(pfh-8).toFixed(0)+'"'
        +' fill="#2a1a0a" stroke="'+ol+'" stroke-width="1"/>');
      // Simple skull in picture
      p.push('<ellipse cx="'+(pfx+pfw/2).toFixed(0)+'" cy="'+(pfy+pfh*0.4).toFixed(0)+'" rx="'+(pfw*0.2).toFixed(0)+'" ry="'+(pfh*0.25).toFixed(0)+'" fill="#c4a040" opacity=".5"/>');
    } else if(d===2){
      // Small statue on right side — pedestal + simple figure
      var sx=fR+(W-fR)*0.3, sy=fB;
      var sbx=sx, sby=fB-4, sbw=16, sbh=8;
      // Perspective-scale the statue based on position
      p.push('<rect x="'+(sbx-sbw/2).toFixed(0)+'" y="'+sby.toFixed(0)+'" width="'+sbw+'" height="'+sbh+'"'
        +' fill="'+wLC+'" stroke="'+ol+'" stroke-width="1.5"/>');
      p.push('<ellipse cx="'+sbx.toFixed(0)+'" cy="'+(sby-12).toFixed(0)+'" rx="7" ry="9"'
        +' fill="'+wLC+'" stroke="'+ol+'" stroke-width="1.5"/>');
      p.push('<rect x="'+(sbx-4).toFixed(0)+'" y="'+(sby-22).toFixed(0)+'" width="8" height="12"'
        +' fill="'+wLC+'" stroke="'+ol+'" stroke-width="1.5"/>');
      // Glowing eyes on statue
      p.push('<circle cx="'+(sbx-2)+'" cy="'+(sby-16)+'" r="1.5" fill="#ff8c00" opacity=".8"/>');
      p.push('<circle cx="'+(sbx+2)+'" cy="'+(sby-16)+'" r="1.5" fill="#ff8c00" opacity=".8"/>');
    }
    // d===3: bare corridor (no detail)
  }
}

function addFloorDust(p, W, H, fB, fL, fR, vpX, vpY, ol){
  // Small dust speckles — deterministic positions that feel random
  // Use 5-6 small dark ellipses scattered on the floor
  var dustPos=[
    [W*0.18, H*0.82, 4, 2],
    [W*0.72, H*0.76, 5, 2.5],
    [W*0.45, H*0.88, 3, 1.5],
    [W*0.62, H*0.92, 6, 2.5],
    [W*0.28, H*0.94, 4, 2],
    [W*0.55, H*0.84, 3, 1.5],
  ];
  dustPos.forEach(function(d){
    p.push('<ellipse cx="'+d[0].toFixed(0)+'" cy="'+d[1].toFixed(0)+'" rx="'+d[2]+'" ry="'+d[3]+'"'
      +' fill="'+ol+'" opacity=".12"/>');
  });
  // A few small pebbles
  p.push('<circle cx="'+(W*0.35).toFixed(0)+'" cy="'+(H*0.87).toFixed(0)+'" r="2" fill="'+ol+'" opacity=".15"/>');
  p.push('<circle cx="'+(W*0.68).toFixed(0)+'" cy="'+(H*0.91).toFixed(0)+'" r="1.5" fill="'+ol+'" opacity=".12"/>');
}

// currentDetailVariant: set before each draw so room detail changes per visit
var currentDetailVariant = 0;

function resize(){
  // no-op for SVG renderer
  cW=0; cH=0;
}
window.addEventListener('resize', function(){ draw(currentRoom,1); });

function draw(room, progress){
  if(progress===undefined) progress=1;
  currentRoom=room;
  // Randomise detail variant each full draw (progress=1)
  if(progress===1) currentDetailVariant=Math.floor(Math.random()*4);
  var el=document.getElementById('dungeon');
  el.innerHTML = makeDungeonSVG(room,progress)
    + '<div id="creature-layer"><div id="cre"></div></div>'
    + '<div id="nav-arrows"></div>';


  document.getElementById('nav-arrows').addEventListener('click',function(e){
    if(gPhase!=='walk'||animating) return;
    var arrow=e.target.closest('[data-dir]');
    if(!arrow) return;
    hideNavArrows();
    advance(arrow.dataset.dir);
  });
}

function startTorchLoop(){ /* SVG is static, no flicker loop needed */ }

function animWalk(toRoom, done){
  animating=true;
  var steps=8, current=0;
  var tick=setInterval(function(){
    current++;
    draw(toRoom, current/steps);
    if(current>=steps){ clearInterval(tick); animating=false; if(done)done(); }
  }, 40);
}

function startGame(){

function earnRune(i){
  const sl=document.getElementById('rs-'+i);if(!sl)return;
  const col=ENC[i].col;
  // Set --c var (used by CSS for border, glow, bg — all consistent)
  sl.style.setProperty('--c', col);

  sl.classList.add('earned');

  if(!document.getElementById('rkf')){const s=document.createElement('style');s.id='rkf';s.textContent='@keyframes runeEarn{0%{transform:scale(0) rotate(-20deg)}70%{transform:scale(1.25) rotate(8deg)}100%{transform:scale(1) rotate(0)}}';document.head.appendChild(s);}
}



// ── Walk / Navigation ──
function pickStepRoom(s){
  const opts=STEP_ROOMS[Math.min(s,STEP_ROOMS.length-1)];
  return opts[Math.floor(Math.random()*opts.length)];
}

// ── SVG arrow paths ──

  // ↑ Straight forward — upward pointing arrow
  fwd:`<svg class="nav-arrow fwd" data-dir="f" width="72" height="88" viewBox="0 0 72 88" xmlns="http://www.w3.org/2000/svg">
    <path d="M36 6 L66 42 L48 42 L48 82 L24 82 L24 42 L6 42 Z"

          stroke="rgba(255,255,255,.25)" stroke-width="2" stroke-linejoin="round"/>

  left:`<svg class="nav-arrow left" data-dir="l" width="88" height="72" viewBox="0 0 88 72" xmlns="http://www.w3.org/2000/svg">
    <path d="M6 36 L42 6 L42 24 L82 24 L82 48 L42 48 L42 66 Z"
          fill="rgba(255,255,255,.92)"

};

function showNavArrows(dirs){
  hasFork = dirs.length > 1;
  const wrap = document.getElementById('nav-arrows');
  wrap.innerHTML = dirs.map(d => ARROW_SVG[d==='l'?'left':d==='r'?'right':'fwd']).join('');
  wrap.classList.add('show');
}
function hideNavArrows(){
  hasFork=false;
  const wrap=document.getElementById('nav-arrows');
  wrap.classList.remove('show');
  // slight delay before clearing so fade-out plays
  setTimeout(()=>{ if(!wrap.classList.contains('show')) wrap.innerHTML=''; },350);
}

// Keep old names as aliases for compatibility
function showTapHint()  { showNavArrows(['f']); }
function hideTapHint()  { hideNavArrows(); }
function showDirChoice(dirs){ showNavArrows(dirs); }
function hideDirOverlay(){ hideNavArrows(); }

function handleDungeonClick(){
  if(gPhase!=='walk'||animating)return;
  if(hasFork)return;
  advance();
}

function chooseDir(d){
  if(gPhase!=='walk'||animating)return;
  hideNavArrows();
  advance(d);
}

function advance(dir){
  hideNavArrows();
  step++;

  // How many walk steps before next encounter?
  // First encounter (encIdx=0): only 1 step total
  // Others: 2 steps
  const stepsNeeded = (encIdx===0) ? 1 : 2;

  if(step < stepsNeeded){
    // Still walking — show a corridor room
    const room = pickStepRoom(step-1);
    const isForkRoom = (room===RT.FORK);
    animWalk(room, ()=>{
      if(isForkRoom){ showNavArrows(['l','r']); }
      else          { showNavArrows(['f']); }
    });
  } else {
    // Ready for next encounter or boss
    step = 0;
    const isBoss = (encIdx >= 5);

    if(isBoss){
      // Boss — go straight to boss room
      animWalk(RT.BOSS, ()=>{ startBoss(); });
    } else if(encIdx === 5){
      // Should not happen but guard
      animWalk(RT.BOSS, ()=>{ startBoss(); });
    } else {
      // Normal encounter
      animWalk(RT.ENC, ()=>{ startEncounter(encIdx); });
    }
  }
}

// ── Encounter ──
function startEncounter(i){
  gPhase='encounter';
  const enc=ENC[i];
  showCreature(enc);
  activeSpell=Array(5).fill(enc.syl);
  currentRuneCol=enc.col;
  sylProgress=0;spellLives=3;
  buildSpellRow(activeSpell, enc.col);
  unlockSyl(0, enc.col);
  showSpellPanel();
  document.getElementById('cast-btn').disabled=false;

}

function startBoss(){
  gPhase='boss';
  // ── Phase 1: quake the dungeon ──
  const gw=document.getElementById('game-wrap');
  gw.classList.add('boss-quake');
  setTimeout(()=>gw.classList.remove('boss-quake'),700);

  // ── Phase 2: lightning flashes ──
  const bl=document.getElementById('boss-lightning');
  [120,220,380].forEach(t=>setTimeout(()=>{
    bl.classList.remove('flash');void bl.offsetWidth;bl.classList.add('flash');
  },t));

  // ── Phase 3: show boss intro overlay ──
  setTimeout(()=>{
    const intro=document.getElementById('boss-intro');
    const preview=document.getElementById('boss-preview');
    const nameEl=document.getElementById('boss-name-text');
    const tapEl=document.getElementById('boss-tap');
    const ring=document.getElementById('boss-ring');

    // Inject boss SVG
    preview.innerHTML=currentBoss.svg;
    nameEl.textContent=currentBoss.name;

    // Reset animation classes
    preview.className=''; nameEl.className=''; tapEl.className=''; ring.className='';
    void preview.offsetWidth;

    // Show overlay
    intro.classList.add('show');

    // Staggered reveals
    requestAnimationFrame(()=>{
      ring.classList.add('active');
      preview.classList.add('show');
      setTimeout(()=>nameEl.classList.add('show'),900);
      setTimeout(()=>tapEl.classList.add('show'),1400);
    });
  },500);

  // Pre-build boss fight data (ready when player dismisses)
  activeSpell=ENC.map(e=>e.syl);
  sylProgress=0;spellLives=3;
}

function dismissBossIntro(){
  const intro=document.getElementById('boss-intro');
  intro.style.transition='opacity .4s';
  intro.style.opacity='0';
  setTimeout(()=>{
    intro.classList.remove('show');
    intro.style.opacity='';intro.style.transition='';
    document.getElementById('boss-ring').className='';
    // Now start the actual boss fight
    showCreature(currentBoss,'boss');
    buildSpellRow(activeSpell, null, true);
    updateBossRunes(0);
    unlockSyl(0, ENC[0].col);
    showSpellPanel();

    document.getElementById('cast-btn').disabled=false;
  },400);
}

function showCreature(monster, type='normal'){
  const c=document.getElementById('cre');
  if(!c) return;
  c.style.animation='none';c.style.opacity='1';
  // Support both SVG monster objects and legacy emoji strings
  if(monster && monster.svg) {
    c.innerHTML = monster.svg;
    c.style.fontSize='';
  } else {
    c.innerHTML='';
    c.textContent = monster;
  }
  void c.offsetWidth;
  if(type==='boss'){
    c.className='cre-boss-pulse';
    c.style.width='clamp(150px,42vw,260px)';
    c.style.filter='drop-shadow(0 4px 24px rgba(255,60,0,.6))';
  } else {
    c.className='';
    c.style.width='clamp(120px,32vw,200px)';
    c.style.filter='drop-shadow(0 8px 14px rgba(0,0,0,.5))';
  }
}

function updateBossRunes(idx){
  for(let i=0;i<5;i++){
    const sl=document.getElementById('rs-'+i);if(!sl)continue;
    sl.classList.remove('boss-now','boss-done');
    if(i<idx){
      sl.classList.add('boss-done');
    } else if(i===idx){
      sl.classList.add('boss-now');
      // Pulse in the rune's own color
      const col=ENC[i].col;
      sl.style.setProperty('--bnow-col',col);
    }
  }
}

// ── Spell building ──
function buildSpellRow(syls, col=null, bossMode=false){
  const row=document.getElementById('syl-row');row.innerHTML='';
  for(let i=0;i<syls.length;i++){
    if(i>0){const d=document.createElement('span');d.className='sy-dot';d.id='syd-'+i;d.textContent='·';row.appendChild(d);}
    const sl=document.createElement('div');sl.className='sy locked';sl.id='sy-'+i;
    // store per-slot color for boss mode
    const slotCol=bossMode?ENC[i].col:(col||'#f5c030');
    sl.dataset.col=slotCol;
    const lb=document.createElement('span');lb.className='sy-l';lb.textContent=syls[i];
    sl.appendChild(lb);row.appendChild(sl);
  }
}

function unlockSyl(idx, col){
  const sl=document.getElementById('sy-'+idx);if(!sl)return;
  const c=col||sl.dataset.col||'#f5c030';
  sl.className='sy active';
  sl.style.setProperty('--rc',c);
  void sl.offsetWidth;
  if(!document.getElementById('suKF')){const s=document.createElement('style');s.id='suKF';s.textContent='.su-pop{animation:supop .5s cubic-bezier(.34,1.56,.64,1) both}@keyframes supop{from{transform:scale(.2) rotate(-15deg);opacity:0;filter:blur(6px)}70%{transform:scale(1.15) rotate(4deg)}to{transform:scale(1) rotate(0);opacity:1}}';document.head.appendChild(s);}
  sl.classList.add('su-pop');setTimeout(()=>sl.classList.remove('su-pop'),550);
}

// ── Cast ──
// Tap mode: 20% chance of wrong per attempt

var SPELL_COLORS=['#ffd700','#ff8c00','#ffaa00','#fff4aa','#ff6600','#ffffaa'];

function startSpellParticles(){
  var gl=document.getElementById('cast-glow');
  if(gl) gl.classList.add('active');
  var el=document.getElementById('spell-particles');
  if(!el) return;
  el.innerHTML='';
  for(var i=0;i<8;i++){
    var sp=document.createElement('div');
    sp.className='sp';
    var size=4+Math.random()*6;
    var radius=28+Math.random()*22;
    var angle=i*(360/8);
    var dur=0.6+Math.random()*0.5;
    var col=SPELL_COLORS[Math.floor(Math.random()*SPELL_COLORS.length)];
    sp.style.cssText='width:'+size+'px;height:'+size+'px;background:'+col+
      ';left:50%;top:50%;margin-left:'+(-size/2)+'px;margin-top:'+(-size/2)+'px;'+
      '--a:'+angle+'deg;--r:'+radius+'px;animation-duration:'+dur+'s;'+
      'box-shadow:0 0 '+size+'px '+col+';';
    el.appendChild(sp);
  }
}

function stopSpellParticles(){
  var gl=document.getElementById('cast-glow');
  if(gl) gl.classList.remove('active');
  var el=document.getElementById('spell-particles');
  if(el) el.innerHTML='';
}

function castPressStart(){
  var btn=document.getElementById('cast-btn');
  if(btn.disabled) return;
  btn.classList.add('recording');
  startSpellParticles();
  if(MIC_STATE==='ready'){
    if(listening) return;
    initSpeech();
    lastInterim=[];
    btn.disabled=true;
    try{ rec.start(); }
    catch(e){ btn.disabled=false; btn.classList.remove('recording'); tapResolve(); }
  }
  // Tap mode: resolve on release (castPressEnd)
}

function castPressEnd(){
  var btn=document.getElementById('cast-btn');
  btn.classList.remove('recording');
  stopSpellParticles();
  // Release burst — quick bright flash on the glow
  castReleaseBurst();
  if(MIC_STATE==='ready' && listening){
    try{ rec.stop(); }catch(e){}
    return;
  }
  if(MIC_STATE!=='ready' && !btn.disabled){
    tapResolve();
  }
}

function castReleaseBurst(){
  var gl=document.getElementById('cast-glow');
  if(!gl) return;
  // Brief intense flash then fade
  gl.style.transition='none';
  gl.style.boxShadow='0 0 120px 60px rgba(255,220,80,.85), 0 0 200px 100px rgba(255,140,0,.5)';
  gl.style.opacity='1';
  setTimeout(function(){
    gl.style.transition='box-shadow .4s ease-out, opacity .4s ease-out';
    gl.style.boxShadow='';
    gl.style.opacity='0';
  }, 60);
}

function tapResolve(){
  Math.random() < 0.20 ? onWrong() : onCorrect();
}


function checkSpeech(alts){
  const flat=activeSpell.slice(0,sylProgress+1).join('').toUpperCase();
  const spaced=activeSpell.slice(0,sylProgress+1).join(' ').toUpperCase();
  const last=activeSpell[sylProgress].toUpperCase();
  let ok=false;
  for(const r of alts){
    const c=r.replace(/[\s\-.]/g,'').toUpperCase();
    if(c===flat||r.toUpperCase()===spaced||c===last){ok=true;break;}
    if(flat.length<=6&&(c.includes(flat)||(flat.includes(c)&&c.length>=2))){ok=true;break;}
  }
  ok?onCorrect():onWrong();
}

function onCorrect(){
  const sl=document.getElementById('sy-'+sylProgress);
  if(!sl) return;
  // Brief white flash, then snap to solved (rune color)
  sl.className='sy sy-solving';void sl.offsetWidth;
  const _solvedIdx=sylProgress; // capture before increment
  setTimeout(()=>{
    const _sl=document.getElementById('sy-'+_solvedIdx);
    if(_sl){
      const _rc=_sl.dataset.col||_sl.style.getPropertyValue('--rc')||'#f5a623';
      _sl.className='sy solved';
      // Set inline styles directly — more reliable than CSS vars on mobile
      _sl.style.setProperty('--rc', _rc);
      _sl.style.borderColor=_rc;
      _sl.style.background='';
      _sl.style.boxShadow='0 0 32px '+_rc+', 0 0 64px '+_rc+'88';
      const _lb=_sl.querySelector('.sy-l');
      if(_lb) _lb.style.color=_rc;
      setTimeout(()=>{if(_sl) _sl.style.boxShadow='0 0 14px '+_rc+'88';},400);
    }
  },180);
  if(sylProgress>0){const d=document.getElementById('syd-'+sylProgress);if(d)d.classList.add('lit');}
  spawnSparks(sl);
  doFlash('teal');
  // Monster gets hit — bump animation
  const cre=document.getElementById('cre');
  if(cre){ cre.style.animation='none'; void cre.offsetWidth; cre.className='cre-hit';
    setTimeout(()=>{ const c2=document.getElementById('cre'); if(c2&&c2.className==='cre-hit') c2.className=''; },460); }
  if(gPhase==='boss')updateBossRunes(sylProgress+1);
  sylProgress++;
  if(sylProgress>=activeSpell.length){
    setTimeout(()=>{ if(gPhase==='encounter')finishEncounter();else finishBoss(); },200);
  } else {
    const nextCol=gPhase==='boss'?ENC[sylProgress].col:currentRuneCol;
    setTimeout(()=>{unlockSyl(sylProgress,nextCol);document.getElementById('cast-btn').disabled=false;},300);

  }
}

function onWrong(){
  doFlash('red');
  // Screen shake
  shakeScreen();
  // Shake current syl
  const sl=document.getElementById('sy-'+sylProgress);
  if(!sl) return;
  sl.className='sy wrong-flash';
  const _syid='sy-'+sylProgress; setTimeout(()=>{ const _sl=document.getElementById(_syid);if(_sl)_sl.className='sy active'; },500);
  // Creature taunts
  const cre=document.getElementById('cre');
  if(cre){cre.className='cre-taunt';setTimeout(()=>{if(document.getElementById('cre'))document.getElementById('cre').className='';},600);}
  document.getElementById('cast-btn').disabled=false;
}

function finishEncounter(){
  const c0=document.getElementById('cre');if(c0)c0.className='';
  earnRune(encIdx);
  encIdx++;
  hideSpellPanel();
  gPhase='walk';
  step=0;
  if(encIdx>=5){
    // All 5 monsters beaten — show preboss door room first
    animWalk(RT.PREBOSS, ()=>{ showNavArrows(['f']); });
  } else {
    const room=pickStepRoom(0);
    animWalk(room,()=>showTapHint());
  }
}

function finishBoss(){
  const c0=document.getElementById('cre');if(c0)c0.className='';
  for(let i=0;i<5;i++){const sl=document.getElementById('rs-'+i);if(sl){sl.classList.remove('boss-now');sl.classList.add('boss-done');}}
  setTimeout(showWin,400);
}

// ── Win ──
function showWin(){
  gPhase='win';
  const wr=document.getElementById('w-runes');wr.innerHTML='';
  ENC.forEach((enc,i)=>{
    const sl=document.createElement('div');sl.className='w-rune';sl.style.setProperty('--i',i);
    sl.style.borderColor=enc.col;sl.style.boxShadow=`0 0 16px ${enc.col}88`;sl.style.background=enc.col+'18';
    const e=document.createElement('div');e.className='wr-e';
    if(enc.svg){e.innerHTML=enc.svg;e.style.width='36px';e.style.height='36px';}
    else e.textContent=enc.e||'?';
    const s=document.createElement('div');s.className='wr-s';s.style.color=enc.col;s.textContent=enc.syl;
    sl.appendChild(e);sl.appendChild(s);wr.appendChild(sl);
  });
  showScreen('s-win');spawnConfetti();
}

// ── Helpers ──
function shakeScreen(){
  const gw=document.getElementById('game-wrap');
  gw.classList.remove('screen-shake');void gw.offsetWidth;
  gw.classList.add('screen-shake');
  setTimeout(()=>gw.classList.remove('screen-shake'),500);
}
function exitDungeon(){

  gPhase='title';
  animating=false;
  if(rec&&listening){ try{rec.stop();}catch(e){} }
  listening=false;
  hideSpellPanel();
  showScreen('s-title');
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function showSpellPanel(){document.getElementById('spell-panel').classList.add('show');}
function hideSpellPanel(){document.getElementById('spell-panel').classList.remove('show');}
function doFlash(t){const f=document.getElementById('flash-overlay');f.className=t;void f.offsetWidth;setTimeout(()=>f.className='',260);}

function spawnSparks(el){
  if(!el)return;
  const r=el.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;
  const cols=['#f5c030','#f5c030','#fff','#aaffee','#ffee66'];
  for(let i=0;i<12;i++){
    const sp=document.createElement('div');sp.className='spark';
    const sz=Math.random()*6+3,angle=(Math.PI*2/12)*i+Math.random()*.4,dist=32+Math.random()*44;
    sp.style.cssText=`width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px;background:${cols[i%5]};box-shadow:0 0 5px ${cols[i%5]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;animation-duration:.55s;animation-delay:${Math.random()*.08}s;`;
    document.body.appendChild(sp);setTimeout(()=>sp.remove(),700);
  }
}

function spawnConfetti(){
  const cols=['#f5c030','#ff6b9d','#54a0ff','#3ddc84','#ff9f43','#cc88ff','#f5c030'];
  for(let i=0;i<90;i++){
    const el=document.createElement('div');el.className='confetti';
    const w=Math.random()*10+4,h=Math.random()*10+4;
    el.style.cssText=`left:${Math.random()*100}vw;top:-14px;width:${w}px;height:${h}px;background:${cols[i%7]};border-radius:${Math.random()>.5?'50%':'3px'};animation-duration:${1.4+Math.random()*2}s;animation-delay:${Math.random()*.7}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),4000);
  }
}

// SPEECH
// ════════════════════════════════════════
function initSpeechIfEnabled(){
  if(activeSettings.mic) initSpeech();
  else enableNoMic();
}
function initSpeech(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){enableNoMic();return;}
  MIC_STATE='ready';
  updateMicUI();
  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);

  function makeRec(){
    var r=new SR();
    r.lang='de-DE';
    r.continuous=false;
    r.maxAlternatives=6;
    // iOS workaround: interimResults=true so we get faster partial results
    r.interimResults=isIOS;

    r.onstart=function(){
      listening=true;
      document.getElementById('mbars').classList.add('on');
      // iOS safety timeout: if no result after 6s, stop and re-enable
      if(isIOS){
        clearTimeout(iosTimeout);
        iosTimeout=setTimeout(function(){
          if(listening){ try{r.stop();}catch(e){} }
        },6000);
      }
    };

    r.onresult=function(e){
      clearTimeout(iosTimeout);
      listening=false;
      document.getElementById('mbars').classList.remove('on');
      // Collect all alternatives across all results (interim + final)
      var candidates=[];
      for(var ri=0;ri<e.results.length;ri++){
        for(var ai=0;ai<e.results[ri].length;ai++){
          candidates.push(e.results[ri][ai].transcript.toUpperCase().trim());
        }
      }
      // On iOS with interimResults, wait for final result if possible
      if(isIOS && !e.results[e.results.length-1].isFinal){
        // Still interim — keep listening, but note the candidate
        lastInterim=candidates;
        return;
      }
      document.getElementById("cast-btn").classList.remove("recording");
      checkSpeech(candidates.length?candidates:(lastInterim||[]));
      lastInterim=[];
    };

    r.onerror=function(e){
      clearTimeout(iosTimeout);
      listening=false;
      document.getElementById('mbars').classList.remove('on');
      var _cb=document.getElementById('cast-btn');if(_cb){_cb.disabled=false;_cb.classList.remove('recording');}
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){
        enableNoMic();
      } else if(e.error==='no-speech'||e.error==='audio-capture'){
        doFlash('red');
      } else {
        doFlash('red');
      }
    };

    r.onend=function(){
      clearTimeout(iosTimeout);
      listening=false;
      document.getElementById('mbars').classList.remove('on');
      var _cb2=document.getElementById('cast-btn');if(_cb2){_cb2.disabled=false;_cb2.classList.remove('recording');}
      // iOS sometimes fires onend before onresult — use interim if available
      if(isIOS && lastInterim && lastInterim.length){
        checkSpeech(lastInterim);
        lastInterim=[];
      }
    };
    return r;
  }

  rec=makeRec();
}
var iosTimeout=null;
var lastInterim=[];
function updateMicUI(){
  var bi  = document.getElementById('btn-icon');
  var mi  = document.getElementById('mic-icon');
  var tog = document.getElementById('set-mic-toggle');
  var st  = document.getElementById('mic-status-label');
  if(MIC_STATE==='ready'){
    if(mi)  mi.textContent  = '🎙';
    if(tog) tog.checked     = true;
    if(st)  { st.textContent='Spracherkennung aktiv'; st.style.color='rgba(100,220,100,.7)'; }
  } else if(MIC_STATE==='unavailable'){
    if(mi)  mi.textContent  = '🚫';
    if(tog) tog.checked     = false;
    if(tog) tog.disabled    = true;
    if(st)  { st.textContent='Nicht verfügbar (Browser)'; st.style.color='rgba(220,100,100,.7)'; }
  } else { // off
    if(mi)  mi.textContent  = '🔇';
    if(tog) tog.checked     = false;
    if(st)  { st.textContent='Spracherkennung aus'; st.style.color='rgba(200,160,80,.4)'; }
  }
}
function enableNoMic(){ MIC_STATE='unavailable'; updateMicUI(); }

  // mic-btn in HUD now just shows mic status, not interactive

}
